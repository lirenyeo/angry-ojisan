services:
  - type: web
    name: angry-ojisan
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "22"
