services:
  - type: web
    name: angry-ojisan
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "22"
